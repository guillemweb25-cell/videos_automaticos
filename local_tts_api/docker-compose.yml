version: "3.8"

services:
  tts_api:
    build: .
    ports:
      - "8022:8000"
    environment:
      - COQUI_TOS_AGREED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ~/.local/share/tts:/root/.local/share/tts  # Cache downloaded models
      - ./audio_seeds:/app/audio_seeds             # Reference audios
      - ./app.py:/app/app.py                       # Live code updates
